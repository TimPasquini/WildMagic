name: Tests

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  lint:
    name: Ruff
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Run Ruff
        run: uv run ruff check .

      - name: Check test formatting
        run: uv run ruff format --check tests

  test:
    name: Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13", "3.14"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Install uv
        uses: astral-sh/setup-uv@v8.2.0
        with:
          enable-cache: true
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: uv sync --locked --group dev

      - name: Run tests
        run: uv run pytest -q

      - name: Run smoke test
        run: uv run python -m wildmagic.smoke_test

      - name: Compile Python sources
        run: uv run python -m compileall -q main.py wildmagic tests
